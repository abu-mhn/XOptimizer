<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
  <title>X Optimizer — What's New</title>
  <link rel="stylesheet" href="style.css">
  <script>
    // Apply the saved theme class early so the page doesn't flash the
    // default dark theme before paint.
    (function applyEarlyTheme() {
      try {
        var t = localStorage.getItem("theme");
        if (t && /^[a-z]+$/.test(t) && t !== "dark") {
          document.addEventListener("DOMContentLoaded", function () {
            document.body.classList.add(t + "-mode");
          });
        }
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <main class="updates-page">
    <header class="updates-header">
      <h1 class="updates-title">What's New</h1>
      <p class="updates-subtitle">Recent changes to X Optimizer.</p>
      <p class="updates-version">Version <span class="updates-version-num">v1.5.1</span></p>
    </header>

    <!-- Bump data-version when the list below changes so the splash flags
         it as fresh for returning users. Keep this attribute in sync with
         the visible version number above. -->
    <article class="updates-card" data-version="v1.5.1">
      <ul class="popup-list">
        <li><strong>Pick knockout size on format switch.</strong> Changing a tournament mid-registration into Swiss + knockout (or Round Robin + knockout) now opens the same Top-N picker the Create flow uses — no more silent default to Top 8.</li>
      </ul>
    </article>

    <nav class="updates-nav">
      <a class="btn updates-enter" href="dashboard/">Open the app</a>
    </nav>
  </main>
</body>
</html>
